# PRM-DETR (Point-to-Region Mamba-DETR) 小模型配置

# 评估或推理时的输入分辨率大小
# 考虑到点监督和小目标检测，采用较高分辨率来保留空间细节
eval_spatial_size: [800, 800]

# 主干网络配置
backbone:
  name: "HGNetv2"
  # 开启 return_idx 提取多尺度特征，包含 P2, P3, P4, P5
  # P2(高分辨率)对小目标至关重要
  return_idx: [1, 2, 3, 4]

# Neck 配置
neck:
  name: "HybridEncoderPRM"
  # 配置各尺度特征通道数（需与 Backbone 输出一致）
  in_channels_list: [64, 128, 256, 512]
  hidden_dim: 256
